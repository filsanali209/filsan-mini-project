<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naughts and Crosses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Naughts and Crosses game</h1>
    <div class="msg-container">
        <p id="msg">The Winner is: <span id="msg-winner"></span></p>
        <button id="PG">Play again</button>
    </div>
    <div class="board">
        <div class="square top left" id="0"></div>
        <div class="square top middle" id="1"></div>
        <div class="square top right" id="2"></div>
        <div class="square left" id="3"></div>
        <div class="square middle" id="4"></div>
        <div class="square right" id="5"></div>
        <div class="square bottom left" id="6"></div>
        <div class="square bottom middle" id="7"></div>
        <div class="square bottom right" id="8"></div>
    </div>
    <div table-container>
        <p>Score Board</p>
        <tr>
            <th>Player</th>
            <th>Computer</th>
        </tr>
        <tr>
            <td id="player-score"></td>
            <td id="computer-score"></td>
        </tr>
    </div>
    <div class="gameButtons">
        <button id="RG">Restart Game</button>
    </div>


<script src="script.js"></script>
</body>
</html>
