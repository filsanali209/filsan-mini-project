<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naughts and Crosses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Naughts and Crosses game</h1>
    <div class="board">
        <div class="square top left" id="1"></div>
        <div class="square top middle" id="2"></div>
        <div class="square top right" id="3"></div>
        <div class="square left" id="4"></div>
        <div class="square middle" id="5"></div>
        <div class="square right" id="6"></div>
        <div class="square bottom left" id="7"></div>
        <div class="square bottom middle" id="8"></div>
        <div class="square bottom right" id="9"></div>
    </div>


<script src="script.js"></script>
</body>
</html>
