<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Naughts and Crosses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 class="lobster-two-regular">Naughts and Crosses game</h1>
    <div class="msg-container" id="hidden-msg">
        <p id="msg-winner" >X's turn!</p>
        <div class="buttons">
            <button id="PG">Play again</button>
            <button id="RG">Restart Game</button>
        </div>
    </div>
    <div class="board">
        <div class="square top left" id="0"></div>
        <div class="square top middle" id="1"></div>
        <div class="square top right" id="2"></div>
        <div class="square left" id="3"></div>
        <div class="square middle" id="4"></div>
        <div class="square right" id="5"></div>
        <div class="square bottom left" id="6"></div>
        <div class="square bottom middle" id="7"></div>
        <div class="square bottom right" id="8"></div>
    </div>
    <div class="score-and-mode-container">
        <div class="score-container">
            <table>
                <thead>
                <tr>
                    <th>Player 1</th>
                    <th>Draws</th>
                    <th id="opponent-name">Computer</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td id="player1-score">0</td>
                    <td id="draws">0</td>
                    <td id="opponent-score">0</td>
                </tr>
                </tbody>
            </table>
        </div>
        <div>
            <select name="game-mode" id="game-mode">
                <option value="computer">1 player</option>
                <option value="twoPlayer">2 players</option>
            </select>
        </div>
    </div>


<script src="script.js"></script>
</body>
</html>
